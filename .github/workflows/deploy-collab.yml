name: Build and Deploy Collab Platform

# Independent pipeline for the collab-platform app. Only runs when its own
# files change, so it never deploys alongside AI Tracker.
on:
  push:
    branches:
      - main
    paths:
      - "collab-platform/**"
      - ".github/workflows/deploy-collab.yml"
  workflow_dispatch:

env:
  ACR_NAME: aitrackeracr # shared registry, separate image
  IMAGE_NAME: collab
  RESOURCE_GROUP: rg-aitracker
  CONTAINER_APP: collab-app

# Required GitHub secrets:
#   AZURE_CREDENTIALS     (existing service principal JSON)
#   COLLAB_DATABASE_URL   (Azure Postgres connection string for collab DB)
#   COLLAB_AUTH_SECRET    (random 32-byte secret; only used once auth is re-enabled)
# The Container App `collab-app` must already exist (see collab-platform/README.md).

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            --file collab-platform/Dockerfile \
            collab-platform

      - name: Sync Container App secrets
        run: |
          az containerapp secret set \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --secrets \
              database-url="${{ secrets.COLLAB_DATABASE_URL }}" \
              auth-secret="${{ secrets.COLLAB_AUTH_SECRET }}"

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars \
              AUTH_DISABLED=true \
              AUTH_URL=https://collab.pghnetworks.com \
              DATABASE_URL=secretref:database-url \
              AUTH_SECRET=secretref:auth-secret
