name: Build and Deploy Collab Platform

# Independent pipeline for the collab-platform app (separate RG, ACR, DB, and
# Container App from AI Tracker).
#
# ⚠️ Currently MANUAL-ONLY (workflow_dispatch). The existing AZURE_CREDENTIALS
# service principal is scoped to AI Tracker's subscription and cannot reach
# rg-collab-platform in the "AI Playground" subscription. To enable auto-deploy
# on push, an Azure admin must create a service principal with Contributor on
# rg-collab-platform and AcrPull on pghcollabacr, then store it as the GitHub
# secret COLLAB_AZURE_CREDENTIALS and switch the `creds:` below + add a push
# trigger. Until then, deploy with: collab-platform/scripts/redeploy.sh
on:
  workflow_dispatch:

env:
  ACR_NAME: pghcollabacr
  IMAGE_NAME: collab
  RESOURCE_GROUP: rg-collab-platform
  CONTAINER_APP: collab-app

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.COLLAB_AZURE_CREDENTIALS }}

      - name: Build and push image
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --file collab-platform/Dockerfile \
            collab-platform

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
